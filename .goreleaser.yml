version: 2

before:
  hooks:
    - go mod tidy
    - go test ./internal/... -count=1 -timeout 5m

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - "-s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    binary: "{{ .ProjectName }}_v{{ .Version }}"

archives:
  - formats:
      - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256

release:
  draft: false
  name_template: "{{ .Tag }}"
  header: |
    ## {{ .Tag }}

    ### Installation

    ```hcl
    terraform {
      required_providers {
        flashblade = {
          source  = "numberly/flashblade"
          version = "{{ .Version }}"
        }
      }
    }
    ```

    ### Checksums

    All artifacts are signed with [Cosign](https://docs.sigstore.dev/cosign/overview/) (keyless, Sigstore).
    Verify with:

    ```bash
    cosign verify-blob \
      --signature {{ .ProjectName }}_{{ .Version }}_SHA256SUMS.sig \
      --certificate {{ .ProjectName }}_{{ .Version }}_SHA256SUMS.pem \
      --certificate-identity-regexp "https://github.com/numberly/opentofu-provider-flashblade" \
      --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
      {{ .ProjectName }}_{{ .Version }}_SHA256SUMS
    ```

changelog:
  use: github-native
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Documentation
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^chore"
      - "^test"
      - "^ci"
      - "^refactor"
