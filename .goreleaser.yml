version: 2

project_name: terraform-provider-mica

before:
  hooks:
    - go mod tidy
    - go test ./internal/... -count=1 -timeout 5m

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - "-s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    binary: "terraform-provider-mica_v{{ .Version }}"

archives:
  - formats:
      - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256
  # The Terraform Registry requires every uploaded asset to have a SHA256
  # entry. Include the registry manifest under its release-time name so the
  # checksum file matches what's actually published.
  extra_files:
    - glob: terraform-registry-manifest.json
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"

# GPG signature on the checksums file — required by the Terraform Registry.
# Cosign keyless signing (handled in release.yml) is complementary, not a
# substitute. The registry validates this .sig against the GPG public key
# uploaded in the publisher's User Settings.
signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  draft: false
  name_template: "{{ .Tag }}"
  # Terraform Registry requires a per-release manifest declaring the supported
  # provider protocol versions. The file at the repo root is uploaded under the
  # registry-expected name so the indexer can fetch it during ingestion.
  extra_files:
    - glob: terraform-registry-manifest.json
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"
  header: |
    ## {{ .Tag }}

    ### Installation

    ```hcl
    terraform {
      required_providers {
        mica = {
          source  = "numberly/mica"
          version = "{{ .Version }}"
        }
      }
    }
    ```

    ### Checksums

    All artifacts are signed with [Cosign](https://docs.sigstore.dev/cosign/overview/) (keyless, Sigstore).
    Verify with:

    ```bash
    cosign verify-blob \
      --signature {{ .ProjectName }}_{{ .Version }}_SHA256SUMS.sig \
      --certificate {{ .ProjectName }}_{{ .Version }}_SHA256SUMS.pem \
      --certificate-identity-regexp "https://github.com/numberly/terraform-provider-mica" \
      --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
      {{ .ProjectName }}_{{ .Version }}_SHA256SUMS
    ```

changelog:
  use: github-native
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Documentation
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^chore"
      - "^test"
      - "^ci"
      - "^refactor"
