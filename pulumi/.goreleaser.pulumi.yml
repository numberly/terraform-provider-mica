version: 2

project_name: pulumi-resource-mica

# Pulumi bridge tags follow the SemVer-compatible convention
# "v{semver}-pulumi[.suffix]" (e.g. v2.22.3-pulumi.alpha). The "-pulumi.*"
# prerelease identifier distinguishes bridge releases from the TF provider
# tags ("v2.22.3") while remaining valid SemVer, so GoReleaser v2 OSS parses
# .Version = "2.22.3-pulumi.alpha" natively without any Pro-only features.
# The TF release workflow excludes these tags via "!v*-pulumi*".

before:
  hooks:
    # Read-only module prep: download + verify. go mod tidy is NOT run here
    # because it mutates go.mod/go.sum — we'd sign artifacts built from
    # tampered source. Tidy-drift is enforced upstream in the prerequisites
    # workflow: if `go mod tidy` would produce a diff, the release fails
    # before this hook runs.
    # NB: GoReleaser v2.15.4 OSS rejects the `cmd:/dir:` map form in
    # before.hooks ("cannot unmarshal !!map into string"), so we inline `cd`.
    - sh -c "cd provider && go mod download"
    - sh -c "cd provider && go mod verify"

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - "-s -w -X github.com/numberly/terraform-provider-mica/pulumi/provider/pkg/version.Version={{.Version}}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    binary: "pulumi-resource-mica"
    dir: "provider"
    main: "./cmd/pulumi-resource-mica"

archives:
  - formats:
      - tar.gz
    name_template: "pulumi-resource-mica-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    files:
      - src: "provider/cmd/pulumi-resource-mica/schema.json"
        dst: "schema.json"
        strip_parent: true
      - src: "provider/cmd/pulumi-resource-mica/bridge-metadata.json"
        dst: "bridge-metadata.json"
        strip_parent: true

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256

release:
  draft: false
  # Replace existing assets on conflict instead of failing with 422
  # already_exists. Makes tag rotations and manual workflow re-runs
  # idempotent — without this, a rerun against an existing release
  # aborts after uploading the first asset (see run on 2026-04-24).
  mode: replace
  name_template: "{{ .Tag }}"
  header: |
    ## {{ .Tag }}

    ### Installation

    ```bash
    pulumi plugin install resource mica {{ .Version }} --server github://api.github.com/numberly
    ```

    ### Python SDK

    Install the wheel from the release assets:

    ```bash
    pip install https://github.com/numberly/terraform-provider-mica/releases/download/{{ .Tag }}/pulumi_mica-{{ .Version }}-py3-none-any.whl
    ```

    ### Go SDK

    The Go SDK is versioned independently (major v0). See the matching
    `sdk/go/v{SDK_VERSION}-pulumi[.suffix]` tag for the exact version:

    ```bash
    export GOPRIVATE="github.com/numberly/*"
    # Example — replace with the sdk/go/... tag from this release's companion tag
    go get github.com/numberly/terraform-provider-mica/pulumi/sdk/go@v0.1.0-pulumi.alpha
    ```

    ### Checksums

    All artifacts are signed with [Cosign](https://docs.sigstore.dev/cosign/overview/) (keyless, Sigstore).
    Verify with:

    ```bash
    cosign verify-blob \
      --signature {{ .ProjectName }}_{{ .Version }}_SHA256SUMS.sig \
      --certificate {{ .ProjectName }}_{{ .Version }}_SHA256SUMS.pem \
      --certificate-identity-regexp "https://github.com/numberly/terraform-provider-mica" \
      --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
      {{ .ProjectName }}_{{ .Version }}_SHA256SUMS
    ```

changelog:
  use: github-native
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Documentation
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^chore"
      - "^test"
      - "^ci"
      - "^refactor"
