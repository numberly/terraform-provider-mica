version: 2

project_name: pulumi-resource-flashblade

# Tags are shaped like "pulumi-2.22.3" to distinguish them from the TF provider
# tags ("v2.22.3"). GoReleaser v2 OSS only knows how to strip a leading "v", and
# its monorepo.tag_prefix feature is Pro-only. To get a clean semver in archive
# names / checksums / install snippets, the caller (pulumi-release.yml) exports
# VERSION="${GITHUB_REF_NAME#pulumi-}" and this config uses {{ .Env.VERSION }}
# everywhere {{ .Version }} would otherwise be needed.

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - "-s -w -X github.com/numberly/opentofu-provider-flashblade/pulumi/provider/pkg/version.Version={{.Env.VERSION}}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    binary: "pulumi-resource-flashblade"
    dir: "provider"
    main: "./cmd/pulumi-resource-flashblade"

archives:
  - formats:
      - tar.gz
    name_template: "pulumi-resource-flashblade-v{{ .Env.VERSION }}-{{ .Os }}-{{ .Arch }}"
    files:
      - src: "provider/cmd/pulumi-resource-flashblade/schema.json"
        dst: "schema.json"
        strip_parent: true
      - src: "provider/cmd/pulumi-resource-flashblade/bridge-metadata.json"
        dst: "bridge-metadata.json"
        strip_parent: true

checksum:
  name_template: "{{ .ProjectName }}_{{ .Env.VERSION }}_SHA256SUMS"
  algorithm: sha256

release:
  draft: false
  name_template: "{{ .Tag }}"
  header: |
    ## {{ .Tag }}

    ### Installation

    ```bash
    pulumi plugin install resource flashblade {{ .Env.VERSION }} --server github://api.github.com/numberly
    ```

    ### Python SDK

    Install the wheel from the release assets:

    ```bash
    pip install https://github.com/numberly/opentofu-provider-flashblade/releases/download/{{ .Tag }}/pulumi_flashblade-{{ .Env.VERSION }}-py3-none-any.whl
    ```

    ### Go SDK

    ```bash
    export GOPRIVATE="github.com/numberly/*"
    go get github.com/numberly/opentofu-provider-flashblade/pulumi/sdk/go@v{{ .Env.VERSION }}
    ```

    ### Checksums

    All artifacts are signed with [Cosign](https://docs.sigstore.dev/cosign/overview/) (keyless, Sigstore).
    Verify with:

    ```bash
    cosign verify-blob \
      --signature {{ .ProjectName }}_{{ .Env.VERSION }}_SHA256SUMS.sig \
      --certificate {{ .ProjectName }}_{{ .Env.VERSION }}_SHA256SUMS.pem \
      --certificate-identity-regexp "https://github.com/numberly/opentofu-provider-flashblade" \
      --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
      {{ .ProjectName }}_{{ .Env.VERSION }}_SHA256SUMS
    ```

changelog:
  use: github-native
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Documentation
      regexp: '^.*?docs(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude:
      - "^chore"
      - "^test"
      - "^ci"
      - "^refactor"
