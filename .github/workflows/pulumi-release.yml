---
name: Pulumi Release

on:
  push:
    tags:
      # Pulumi bridge releases use SemVer tags with a "-pulumi[.suffix]" prerelease
      # identifier, e.g. v2.22.3-pulumi.alpha. This keeps GoReleaser OSS happy
      # (valid SemVer) while distinguishing from TF provider tags ("v2.22.3").
      - "v*-pulumi*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  prerequisites:
    name: Prerequisites
    uses: ./.github/workflows/pulumi-prerequisites.yml

  release_provider:
    name: Release Provider
    needs: prerequisites
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: pulumi/provider/go.mod
          cache: true

      - name: Download schema artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "schema*"
          path: pulumi/provider/cmd/pulumi-resource-flashblade/
          merge-multiple: true

      - name: Download bridge-metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: bridge-metadata
          path: pulumi/provider/cmd/pulumi-resource-flashblade/

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          # workdir=pulumi so `dir: provider` in the config resolves to
          # pulumi/provider. Goreleaser writes artifacts to pulumi/dist/.
          workdir: pulumi
          args: release --clean --config .goreleaser.pulumi.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign checksums with Cosign (keyless)
        working-directory: pulumi
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cosign sign-blob --yes \
            --output-signature "dist/pulumi-resource-flashblade_${VERSION}_SHA256SUMS.sig" \
            --output-certificate "dist/pulumi-resource-flashblade_${VERSION}_SHA256SUMS.pem" \
            "dist/pulumi-resource-flashblade_${VERSION}_SHA256SUMS"

      - name: Upload signatures to release
        working-directory: pulumi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release upload "${GITHUB_REF_NAME}" \
            "dist/pulumi-resource-flashblade_${VERSION}_SHA256SUMS.sig" \
            "dist/pulumi-resource-flashblade_${VERSION}_SHA256SUMS.pem" \
            --clobber

  release_python_sdk:
    name: Release Python SDK
    # Depend on release_provider so the GitHub release exists before we upload the wheel.
    needs: release_provider
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: pulumi/provider/go.mod
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download schema artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "schema*"
          path: pulumi/provider/cmd/pulumi-resource-flashblade/
          merge-multiple: true

      - name: Download bridge-metadata artifact
        uses: actions/download-artifact@v4
        with:
          name: bridge-metadata
          path: pulumi/provider/cmd/pulumi-resource-flashblade/

      # SKIP_TFGEN=1 + _from_schema: Python codegen + wheel build in one step
      # using the downloaded schema. Drops the old "Generate Python SDK"
      # step — its work is now a Make prereq of test_python_sdk_from_schema.
      - name: Build Python wheel (schema pre-fetched)
        working-directory: pulumi
        run: make SKIP_TFGEN=1 test_python_sdk_from_schema

      - name: Upload wheel to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WHEEL_FILE=$(ls pulumi/sdk/python/dist/pulumi_flashblade-*.whl | head -n1)
          if [ -z "$WHEEL_FILE" ]; then
            echo "Wheel file not found"
            exit 1
          fi
          gh release upload "${GITHUB_REF_NAME}" "$WHEEL_FILE" --clobber

  tag_go_sdk:
    name: Tag Go SDK
    needs: release_provider
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push Go SDK tag
        run: |
          # GITHUB_REF_NAME is "v2.22.3-pulumi.alpha" — Go SDK tag keeps the "v"
          # and drops nothing, giving "sdk/go/v2.22.3-pulumi.alpha".
          GO_TAG="sdk/go/${GITHUB_REF_NAME}"
          if git ls-remote --tags origin "refs/tags/${GO_TAG}" | grep -q .; then
            echo "Tag ${GO_TAG} already exists on remote — skipping (idempotent rerun)"
            exit 0
          fi
          git tag "${GO_TAG}" "${GITHUB_SHA}"
          git push origin "${GO_TAG}"
